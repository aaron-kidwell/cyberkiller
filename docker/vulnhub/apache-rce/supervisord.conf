[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:sshd]
command=/usr/sbin/sshd -D
autostart=true
autorestart=true
stdout_logfile=/dev/null
stderr_logfile=/dev/null

[program:httpd]
command=/usr/local/apache2/bin/httpd -D FOREGROUND
autostart=true
autorestart=true
stdout_logfile=/dev/null
stderr_logfile=/dev/null
