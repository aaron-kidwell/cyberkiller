[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:sshd]
command=/usr/sbin/sshd -D
autostart=true
autorestart=true
stdout_logfile=/dev/null
stderr_logfile=/dev/null

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/dev/null
stderr_logfile=/dev/null

[program:struts]
command=/bin/bash -c "cd /usr/src && mvn jetty:run -q"
autostart=true
autorestart=true
stdout_logfile=/dev/null
stderr_logfile=/dev/null
startsecs=30
