[global]
   workgroup = MERIDIAN
   server string = Meridian File Server
   security = user
   map to guest = Bad User
   guest account = nobody
   log level = 0
   server min protocol = NT1

[backups]
   path = /srv/backups
   browsable = yes
   read only = yes
   guest ok = yes
   comment = IT backups (restricted)

# Deploy drop-box: ops copy maintenance scripts here and a root cron runs them.
# Anonymous write is a misconfig -> drop a script -> root RCE in <60s.
[deploy]
   path = /opt/deploy
   browsable = yes
   read only = no
   guest ok = yes
   force user = root
   comment = Maintenance script drop (auto-run)
