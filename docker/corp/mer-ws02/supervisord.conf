[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:sshd]
command=/usr/sbin/sshd -D
autostart=true
autorestart=true
stdout_logfile=/dev/null
stderr_logfile=/dev/null

[program:ittools]
command=/usr/bin/python3 /opt/ittools/ittools.py
user=itweb
autostart=true
autorestart=true
stdout_logfile=/dev/null
stderr_logfile=/dev/null
