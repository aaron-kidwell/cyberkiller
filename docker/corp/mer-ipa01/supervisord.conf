[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:sshd]
command=/usr/sbin/sshd -D
autostart=true
autorestart=true
stdout_logfile=/dev/null
stderr_logfile=/dev/null

[program:slapd]
command=/usr/sbin/slapd -u openldap -g openldap -h "ldap:/// ldapi:///" -d 0
autostart=true
autorestart=true
stdout_logfile=/dev/null
stderr_logfile=/dev/null
